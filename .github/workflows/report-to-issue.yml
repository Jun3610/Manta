name: Report to Issue

on:
  push:
    branches: [main]
    paths:
      - 'reports/**.md'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new report files
        id: files
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- 'reports/*.md')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create issue for each new report
        if: steps.files.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = `${{ steps.files.outputs.files }}`.split('\n').filter(Boolean);
            for (const file of files) {
              const content = fs.readFileSync(file, 'utf8');
              const titleMatch = content.match(/^#\s+(.+)$/m);
              const title = titleMatch ? titleMatch[1] : file;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: content + `\n\n---\n_출처: [${file}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${context.sha}/${file})_`,
                labels: ['implementation-report']
              });
            }

